# Gestalt-managed pipeline (ADR-033 + ADR-041).
#
# ADR-041 — CI is the primary runtime quality gate. It runs lint,
# tests, and a security scan before the Gestalt LLM gate
# (constraint-agent + review-agent) is dispatched against the same
# branch. The LLM gate focuses exclusively on architectural
# compliance and design-spec adherence; it never re-runs anything
# CI already validated.
#
# Dispatched by the platform on two occasions:
#   1. pipeline-agent triggers it after pr-agent opens (or pushes to)
#      a PR — this is the build/test/lint/security check that gates
#      the gate
#   2. promotion-agent triggers it on each environment promotion
#      (`environment` input set to `staging` then `production`)
#
# Setup steps + commands are stack-specific — generated by the
# `generateStackConfig` LLM call at `gestalt init` time from the
# project description. Customise below for your project's
# build / lint / integration test / deploy commands.

name: gestalt
# TR_020 — one CI run per Aider push for the build/test/lint/scan
# quality job. PR-Agent (ADR-051 / TR_027) runs SERVER-SIDE inside
# the Gestalt container via `executeScript` after CI passes —
# Gestalt's own LLM credentials drive it, and `.pr_agent.toml`
# committed to the project repo carries the project-specific
# review focus. No CI step or repo secret required.
#   - `push`             triggers `quality` (build / test / lint /
#                        security) on every Gestalt branch commit.
#   - `workflow_dispatch` retained ONLY for promotion-agent's
#                        staging / production deploy invocation
#                        (different `inputs.environment` value).
on:
  push:
    branches: ['gestalt/**']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging | production). Other values are accepted on CI-only dispatches.'
        required: false
        default: 'staging'
        type: string
      correlationId:
        description: 'Gestalt correlation id for this intent cycle.'
        required: false
        type: string
      branch:
        description: 'Source branch for the dispatched run.'
        required: false
        type: string

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --ci

      - name: Compile
        run: |
          if [ -f package.json ] || [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f go.mod ] || [ -f Cargo.toml ]; then
            
          else
            echo "No project manifest found yet — skipping compile (run 'gestalt run' to scaffold the project)"
          fi

      - name: Test
        run: |
          if [ -f package.json ] || [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f go.mod ] || [ -f Cargo.toml ]; then
            npm run test
          else
            echo "No project manifest found yet — skipping tests (run 'gestalt run' to scaffold the project)"
          fi

      - name: Lint
        run: |
          if [ -f package.json ] || [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f go.mod ] || [ -f Cargo.toml ]; then
            npx eslint src --max-warnings 0
          else
            echo "No project manifest found yet — skipping lint"
          fi

      - name: Security scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true
