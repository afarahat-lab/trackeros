# Gestalt-managed pipeline (ADR-033 + ADR-041).
#
# ADR-041 — CI is the primary runtime quality gate. It runs build,
# tests, lint, and a security scan before the Gestalt LLM gate
# (constraint-agent + review-agent) is dispatched against the same
# branch. The LLM gate focuses exclusively on architectural
# compliance and design-spec adherence; it never re-runs anything
# CI already validated.
#
# Dispatched by the platform on two occasions:
#   1. pipeline-agent triggers it after pr-agent opens (or pushes to)
#      a PR — this is the build/test/lint/security check that gates
#      the LLM gate.
#   2. promotion-agent triggers it on each environment promotion
#      (`environment` input set to `staging` then `production`).
#
# Also triggered automatically by `push: branches: ['gestalt/**']`
# whenever pr-agent pushes a branch (TR_018 / ADR-041), so CI runs
# without needing the platform to dispatch it.

name: gestalt
# TR_020 — pull_request trigger removed (duplicated push, tripled CI
# minutes in TR_019). push handles every Aider commit; workflow_dispatch
# stays for promotion-agent's staging / production deploys.
# TR_027 — pull_request re-added (gated to the `ai-review` job only)
# so PR-Agent can post its review comment when pr-agent opens a PR.
# The `quality` job stays push-only.
on:
  push:
    branches: ['gestalt/**']
  pull_request:
    branches: ['main']
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging | production). Other values are accepted on CI-only dispatches.'
        required: false
        default: 'staging'
        type: string
      correlationId:
        description: 'Gestalt correlation id for this intent cycle.'
        required: false
        type: string
      branch:
        description: 'Source branch for the dispatched run.'
        required: false
        type: string

jobs:
  quality:
    # TR_027 — skip on pull_request events so this job doesn't
    # double-run on PR sync. PR-Agent has its own job below.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --legacy-peer-deps

      - name: Compile
        run: |
          if [ -f package.json ] || [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f go.mod ] || [ -f Cargo.toml ]; then
            npm run build
          else
            echo "No project manifest found yet — skipping compile (run 'gestalt run' to scaffold the project)"
          fi

      - name: Test
        run: |
          if [ -f package.json ] || [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f go.mod ] || [ -f Cargo.toml ]; then
            npm test
          else
            echo "No project manifest found yet — skipping tests (run 'gestalt run' to scaffold the project)"
          fi

      - name: Lint
        run: |
          if [ -f package.json ] || [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f go.mod ] || [ -f Cargo.toml ]; then
            npm run lint
          else
            echo "No project manifest found yet — skipping lint"
          fi

      - name: Security scan
        uses: returntocorp/semgrep-action@v1
        with:
          config: auto
        continue-on-error: true

  ai-review:
    # ADR-051 — PR-Agent posts a code-review comment on the PR.
    # pipeline-agent reads the verdict via the GitHub API before
    # dispatching the Gestalt LLM gate; on `changes-requested` the
    # self-healing diagnostician reads the comment text and picks
    # `retry` / `fix-intent` / `escalate` per ADR-050. Custom focus
    # comes from `.pr_agent.toml` — generated from HARNESS.json.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - name: AI Code Review (PR-Agent)
        uses: Codium-ai/pr-agent@main
        env:
          OPENAI_KEY: ${{ secrets.GESTALT_LLM_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          command: review
