# Gestalt-managed pipeline (ADR-033).
#
# Dispatched by the platform on two occasions:
#   1. pipeline-agent triggers it after pr-agent opens a PR
#   2. promotion-agent triggers it on each environment promotion
#      (`environment` input set to `staging` then `production`)
#
# Setup steps + test command are stack-specific — generated by the
# `generateStackConfig` LLM call at `gestalt init` time from the
# project description. Customise the steps below for your project's
# build / lint / integration test / deploy commands.

name: gestalt
on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (staging | production). Other values are accepted on CI-only dispatches.'
        required: false
        default: 'staging'
        type: string
      correlationId:
        description: 'Gestalt correlation id for this intent cycle.'
        required: false
        type: string
      branch:
        description: 'Source branch for the dispatched run.'
        required: false
        type: string

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm install --ci

      - name: Run tests
        run: |
          if [ -f package.json ] || [ -f requirements.txt ] || [ -f pyproject.toml ] || [ -f go.mod ] || [ -f Cargo.toml ]; then
            npm test
          else
            echo "No project manifest found yet — skipping tests (run 'gestalt run' to scaffold the project)"
          fi
