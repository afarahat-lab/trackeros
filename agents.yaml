# agents.yaml — verification of per-agent model override
agents:
  intent-agent:
    role: "Senior software architect"
    goal: "Extract a precise, unambiguous specification from a natural language intent"
    llm:
      model: gpt-4o-mini    # cheaper model for intent parsing
      temperature: 0.1
      max_tokens: 2000
    prompt_extensions: []

  code-agent:
    role: "Senior TypeScript engineer"
    goal: "Generate production-quality TypeScript code that follows the project harness"
    llm:
      model: gpt-4o         # best model for code generation
      temperature: 0.2
      max_tokens: 8000
    tools:
      builtin:
        - readFile
        - listDirectory
        - searchFiles
        - getFileTree
    prompt_extensions:
      - "Always add a JSDoc comment to every exported function"
      - "Use Result<T,E> pattern for error handling"

  # ── Gate layer (Amendment 2026-06: tools enabled) ───────────────────────
  review-agent:
    role: "Senior engineer and code reviewer"
    goal: "Assess generated code quality and architectural correctness"
    llm:
      temperature: 0.1
      max_tokens: 4000
    tools:
      builtin:
        - readFile
        - searchFiles
    prompt_extensions: []

  # ── Maintenance layer (Amendment 2026-06: tools enabled) ───────────────
  drift-agent:
    role: "Technical documentation specialist"
    goal: "Detect when project documentation has fallen behind the codebase"
    llm:
      temperature: 0.1
      max_tokens: 2000
    tools:
      builtin:
        - readFile
        - listDirectory
        - searchFiles
        - getFileTree
    prompt_extensions: []

  alignment-agent:
    role: "Technical documentation specialist"
    goal: "Ensure project context files are internally consistent"
    llm:
      temperature: 0.1
      max_tokens: 2000
    tools:
      builtin:
        - readFile
        - listDirectory
        - searchFiles
        - getFileTree
    prompt_extensions: []

  context-fixer:
    role: "Technical writer"
    goal: "Apply additive context-file edits that resolve maintenance findings"
    llm:
      temperature: 0.2
      max_tokens: 8192
    tools:
      builtin:
        - readFile
        - listDirectory
    prompt_extensions: []

custom_agents:
  - name: docs-check-agent
    role: "Documentation reviewer"
    goal: "Ensure all exported functions have JSDoc comments"
    llm:
      temperature: 0.1
      max_tokens: 3000
    prompt: |
      You are {{role}}. Goal: {{goal}}.

      Review these generated TypeScript files. For each EXPORTED function
      (export function / export const X = () => ...) that lacks a JSDoc
      block immediately above it, emit one finding.

      ## Files
      {{artifacts}}

      Return JSON only — no markdown fences, no preamble:
      {
        "passed": true|false,
        "findings": [
          { "severity": "low", "file": "path", "description": "Missing JSDoc on: <function name>" }
        ],
        "summary": "one line"
      }

