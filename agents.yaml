# agents.yaml — Gestalt agent configuration
#
# Seeded by 'gestalt init'. Safe to customise — operators tune prompts,
# change LLM parameters, and add prompt extensions per project without
# touching framework code.
#
# Infrastructure agents (pipeline-agent, promotion-agent, gc-agent)
# do deterministic work and are NOT configurable here.
#
# constraint-agent and test-runner-agent ARE LLM-driven as of
# TEST_REPORT_005 (executeScript evolution) — their behaviour is
# controlled by HARNESS.json's `agentConfig.<agent-name>.rules`
# (plain-English rules) plus the executeScript tool. They appear
# in the agents list at the bottom for reference but do not need
# to be customised here unless an operator wants to override the
# default tool set or LLM parameters.
#
# Key conventions:
#   role  — short professional title (becomes "You are <role> working on
#           the Gestalt platform.")
#   goal  — one sentence stating what the agent is trying to accomplish
#   llm.model         — '~' (YAML null) means "use the platform default
#                       from .env LLM_MODEL". Set to a specific model
#                       name (e.g. "gpt-4o", "gpt-4o-mini") to override.
#                       The override reuses the platform's baseUrl +
#                       apiKey — only the model name changes on the wire.
#   llm.temperature, llm.max_tokens — override the platform defaults
#   prompt_extensions — list of standing project rules appended to every
#                       prompt under a "Project-specific instructions"
#                       heading

agents:

  intent-agent:
    rules:
    - This intent describes a single phase of a multi-phase feature. If a 'Deferred to later phases' section is present, the items listed there are intentionally out of scope for this phase. Do not flag them as ambiguities or missing functionality.
    - Evaluate the intent against what this phase explicitly commits to delivering, not against the full feature description.
    - Interface method signatures in per-phase architecture specifications are CONTRACTS to be implemented by the code-agent during this phase. They are not stubs. An interface showing method signatures without bodies is correct and complete — do not flag missing method bodies as ambiguity or missing implementation.
    - When a '## Canonical dependencies for this phase' or '## Canonical entity fields for this phase' block is present in the intent text, those lists are the authoritative output of the per-phase architecture pass, which runs AFTER the intent text was generated. The intent text may reference outdated names from an earlier planning pass. This is EXPECTED and is NOT ambiguity. Do NOT emit a CONTEXT_GAP signal for any mismatch between names in the intent text and names in the canonical blocks. Instead, silently treat the canonical block as the correct specification and proceed. Mismatched names between intent text and canonical blocks are never high-impact ambiguity.
    role: "Senior software architect"
    goal: "Extract a precise, unambiguous specification from a natural language intent"
    llm:
      # TR_050 — DeepInfra-hosted DeepSeek-V3.2 (chat-completions
      # apiShape); reasoning_effort intentionally omitted (not
      # supported by DeepInfra OpenAI-compatible endpoint).
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions: []

  design-agent:
    role: "Senior software architect"
    goal: "Produce domain model changes, API contracts, and component specs"
    llm:
      # TR_050 — DeepInfra DeepSeek-V3.2
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions: []

  context-agent:
    role: "Technical writer"
    goal: "Keep project context files accurate and up to date"
    llm:
      # TR_061-followup — was `model: ~` (platform default). The TR_061
      # second run hit a moonshotai/Kimi-K2.6 timeout in context-agent's
      # tool-loop because the env LLM_MODEL fallback resolved to Kimi
      # before the registry default could take over. Pin to V4-Pro
      # explicitly to bypass the env-fallthrough.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    tools:
      builtin:
        - readFile          # read existing context files before updating
        - listDirectory     # explore the docs/ structure
        - searchFiles       # find where references need to change
        - getFileTree       # understand project layout
    prompt_extensions: []

  code-agent:
    rules:
    - Generated code must compile without errors. Verify with executeScript before returning.
    - All imports must resolve to files that exist in the project or are declared in package.json.
    - You MUST run a compile/lint check via executeScript before emitting the final files. This is not optional.
    - Do not use require() for JSON imports — import them using ES module syntax with resolveJsonModule enabled in tsconfig.
    - Before generating any repository, service, or controller code, read the DTO and interface files it will use. Never reference a field on a type without confirming it exists in the type definition.
    - Before generating code that calls methods on a dependency, read the dependency's source file to confirm which methods exist. Only call methods that are actually defined.
    - Read the project's compiler/linter configuration file (tsconfig.json, mypy.ini, pyproject.toml, .eslintrc etc) before generating code. Follow the strictness settings it defines — do not assume permissive defaults.
    - Read the project's dependency manifest (package.json, requirements.txt, go.mod, pom.xml etc) before importing external packages. Only import packages that are listed as dependencies.
    - Your verification command is configured to fail when no source implementation files exist. You MUST write implementation files before verification can pass. Do not consider the task complete based on a passing verification that ran before any source files were written.
    - When code in one module needs data or behavior owned by another module, depend on that module's public SERVICE interface — never import another module's repository or other private files. A module's repository is private to that module; cross-module access goes through the owning module's service. A service may import its own module's repository interface (the standard repository pattern).
    - Every method that calls an injected repository or external service must wrap the call in explicit error handling. Do not let errors from dependency calls propagate unhandled.
    role: "Senior TypeScript engineer"
    goal: "Generate production-quality TypeScript code that follows the project harness"
    llm:
      # TR_050 — initially switched off deepseek-ai/DeepSeek-V3.2
      # onto moonshotai/Kimi-K2.6 for code-agent because DeepSeek
      # V3.2 reasoned ABOUT Aider's SEARCH/REPLACE protocol but
      # did not reliably EMIT the blocks — Aider's diff parser
      # saw zero edits and exited with only metadata changes.
      #
      # 2026-06-15 (TR_056-aider-diag) — switched off Kimi-K2.6
      # onto deepseek-ai/DeepSeek-V4-Pro because Kimi-K2.6 on
      # DeepInfra now drops chunked-transfer streams mid-response
      # (litellm.APIConnectionError: peer closed connection
      # without sending complete message body). Symptom on
      # platform: code-agent exits 124 after the 15-min
      # subprocess timeout (executeScript's MAX_SCRIPT_TIMEOUT_MS)
      # while litellm retries the broken connection.
      #
      # V4-Pro is the new bet: improved instruction-following
      # vs V3.2 means it should emit SEARCH/REPLACE blocks
      # reliably. If V4-Pro also fails Aider's diff parser
      # (same failure mode as V3.2), revert to Kimi and find a
      # different mitigation for the streaming flake.
      #
      # TR_077-qwen — swapped off deepseek-ai/DeepSeek-V4-Pro onto
      # Qwen/Qwen3.6-27B to test whether a different code-agent model
      # gets past the layering wall + Mode A on dependency-bearing
      # service phases. Exact DeepInfra model string confirmed against
      # https://api.deepinfra.com/v1/openai/models (Qwen/Qwen3.6-27B).
      # Unregistered model string → resolves via the env DeepInfra
      # default (LLM_BASE_URL/LLM_API_KEY) per llm/index.ts fallback.
      #
      # 2026-06-20 — switched code-agent to fireworks/qwen3p6-plus.
      # deepseek-v4-pro entered a degenerate repetition loop on Aider
      # (restating one observation until it blew the 16k output cap →
      # 0/partial source). Qwen 3.6 converged cleanly on the same
      # intent via `gestalt agent test code-agent` (build + 17/17 jest
      # green, no loop, 3.2 min). The other agents stay on
      # deepseek-v4-pro. (TR_079 driver finding.)
      #
      # 2026-06-29 (ADR-063) — switched to fireworks/kimi-k2p7-code for the
      # OpenHands code-agent. qwen3p7-plus burned all of OpenHands'
      # CodeActAgent iterations without emitting edits (too weak for the
      # agentic tool loop); kimi-k2p7-code completed a trivial task cleanly
      # (AgentState.FINISHED, file written) in the smoke test.
      model: fireworks/kimi-k2p7-code
      temperature: 0.1
      # No reasoning_effort — Aider drives its own reasoning loop;
      # DeepInfra also does not support reasoning_effort.
    tools:
      builtin:
        - readFile          # read existing files before modifying
        - listDirectory     # explore the project structure
        - searchFiles       # find where things are defined
        - getFileTree       # understand project layout
        - executeScript     # verify generated code (compile / lint / etc.)
                            # The agent picks the command — there are NO
                            # hardcoded shell strings on the platform.
                            # Hard blocklist: rm -rf, git push/commit/reset/rebase,
                            # curl|sh, wget|sh, > /etc/, sudo (never overridable).
      # ADR-039 — MCP (Model Context Protocol) servers extend the
      # agent with external tools (issue trackers, dashboards, docs).
      # Tool names are auto-namespaced as `<serverName>__<toolName>`
      # so they cannot shadow the built-ins.
      #
      # token_from sources:
      #   harness            — reads HARNESS.json mcp.servers[].token
      #                        (token sits in the project repo —
      #                        visible to anyone with repo access)
      #   project_credential — reuses the project Git PAT
      #   env:VAR_NAME       — reads process.env.VAR_NAME on the
      #                        server process (recommended for any
      #                        sensitive secret)
      # mcp:
      #   - name: github
      #     url: https://mcp.github.com/v1
      #     token_from: env:GITHUB_MCP_TOKEN
      #   - name: localfs
      #     url: stdio:npx @modelcontextprotocol/server-filesystem /tmp/project
      #     token_from: env:NOOP   # stdio servers usually don't need a token
    # Stack-specific coding conventions generated by the
    # `generateStackConfig` LLM call at `gestalt init` time.
    # Add more project-specific extensions below as needed.
    prompt_extensions:
      - "Begin each phase with the architect edit format — it plans multi-file changes best. Only fall back to the diff edit format when you have EVIDENCE of assistant-mode drift in the feedback (the model acknowledged file additions conversationally without producing edits, and no files were written). Do not pre-emptively avoid architect."
      - "Use ES module syntax with resolveJsonModule for JSON imports — never require()"
      - "Use async/await throughout, never callbacks"
      - "Do not use require() for JSON imports — import them using ES module syntax with resolveJsonModule enabled in tsconfig."

  test-agent:
    role: "Senior QA engineer"
    goal: "Generate comprehensive Jest tests mapped to success criteria"
    llm:
      # TR_061-followup — pin off env-default fallthrough to Kimi-K2.6.
      # test-agent is skipped under Aider backend (ADR-043) but the pin
      # is harmless and consistent.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions: []

  # ── Gate layer (Amendment 2026-06: tools enabled by default) ──
  constraint-agent:
    rules:
    - Data access is only permitted in the designated data access layer of this project. Code in business logic, presentation, or routing layers must delegate all data operations to the data access layer.
    - The data access layer is the only layer permitted to contain connection management, query execution, and direct interaction with the data store.
    - Each architectural layer communicates only with its immediately adjacent layer. Layers must not bypass intermediate layers.
    - Dependencies flow in one direction only — from outer layers toward inner layers. Inner layers must not depend on outer layers.
    - Error handling must be explicit. Callers must not be exposed to unhandled failures from dependencies.
    verificationGuidance:
    - Before evaluating any finding, read ARCHITECTURE.md to understand this project's specific layer names, boundaries, and directory structure. Use this to determine what constitutes the data access layer, business logic layer, and routing layer for this project.
    - A finding is only valid if it violates a rule given the actual structure of this project as described in ARCHITECTURE.md.
    - When a 'Phase scope' block is present with a defaultBranch value, scope your evaluation to the files changed in this phase only. Run `git diff origin/<defaultBranch>...HEAD --name-only` via executeScript at the start of your evaluation to identify those files. Files not in that diff were passing before this phase — do not re-evaluate them. If the diff command fails or returns empty, fall through to evaluating the artifact files inlined above.
    - 'The repository pattern is sanctioned data-access delegation. A business-logic-layer service that depends on a repository INTERFACE — via constructor injection or by importing the interface type — is correctly delegating data access to the data access layer; this is NOT a data-access-layer violation. Only flag a data-access violation when a non-data-access-layer file performs data access DIRECTLY: inline SQL, connection management, query execution, or direct datastore calls.'
    - Before reporting an import as a broken, missing, or non-existent dependency, confirm the target file is actually absent on the branch using readFile or `ls` via executeScript. A file created in a PRIOR phase is intentionally not in this phase's git diff but DOES exist on the branch — never flag an import of a prior-phase file as broken or missing.
    - Consult the dependency-direction graph in ARCHITECTURE.md. A cross-module dependency that follows a documented allowed direction is sanctioned — do not flag it as a circular or bidirectional-dependency risk unless you find an ACTUAL reverse import that creates a cycle. Speculative risk is not a violation.
    - The project's shared infrastructure directory (the common/shared module location defined in ARCHITECTURE.md) hosts cross-cutting infrastructure — shared connection pools or clients, utility modules, and shared type definitions. This directory is sanctioned shared infrastructure, NOT a layering violation. Data-access-layer code that imports a shared connection pool or client from the shared infrastructure directory is following the correct pattern. Do NOT flag such imports as data-access-layer violations, and do NOT flag the shared connection/utility module itself as data access outside the data access layer.
    - A service class calling a method on an injected repository interface is correct delegation to the data-access layer. Do NOT flag this as direct data access — the call goes through the interface, not to a data store directly.
    - Reading properties or fields on a domain model object that was returned by a repository call is business logic, not data access. Do NOT flag field access on fetched domain objects as a data-access-layer violation.
    role: "Architectural constraint evaluator"
    goal: "Verify generated code satisfies all project architectural rules using executeScript + read-only file tools"
    llm:
      # TR_067 §3 — DeepSeek-V4-Pro at reasoning_effort: low. The
      # V3.2 default produced 21-tool-call 164k-token 203s runs on
      # Phase 1 of leave-management. ADR-043 specifies low reasoning
      # effort for deterministic gate checks; V4-Pro's higher
      # per-turn throughput + the §1 cap raise + the §2 git-diff
      # scoping should bring constraint-agent under 90s typical.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      reasoning_effort: low
      temperature: 0.0
    tools:
      builtin: [executeScript, readFile, searchFiles]
    prompt_extensions: []

  review-agent:
    rules:
    - Only flag violations for concerns explicitly in scope for this intent.
    - Do not flag items as missing if they already exist on the project main branch.
    - A finding is only valid if it is supported by quoted evidence from the artifact.
    verificationGuidance:
    - Before reviewing, read ARCHITECTURE.md to understand the project's layer structure, naming conventions, and boundaries. Use this as the reference for what is correct versus what is a violation.
    - Verify any architectural finding against ARCHITECTURE.md before emitting it.
    role: "Senior engineer and code reviewer"
    goal: "Assess generated code quality and architectural correctness — verify findings with executeScript before flagging"
    llm:
      # TR_050 — DeepInfra DeepSeek-V3.2 (no reasoning_effort —
      # not supported by DeepInfra).
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.0
    tools:
      # TEST_REPORT_007 — gains executeScript so it can `tsc --noEmit`
      # to verify import resolution before flagging "Import cannot be
      # resolved" findings. searchFiles + readFile are the legacy
      # spot-check toolset. Same hard blocklist as code-agent (no rm
      # -rf / no git push / no sudo / no curl|bash / etc.) applies.
      builtin: [executeScript, readFile, searchFiles]
    prompt_extensions: []

  # ── Maintenance layer (Amendment 2026-06: tools enabled) ──────
  drift-agent:
    role: "Technical documentation specialist"
    goal: "Detect when project documentation has fallen behind the codebase"
    llm:
      # TR_061-followup — pin off env-default Kimi-K2.6 fallthrough.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    tools:
      builtin: [readFile, listDirectory, searchFiles, getFileTree]
    prompt_extensions: []

  alignment-agent:
    role: "Technical documentation specialist"
    goal: "Ensure project context files are internally consistent"
    llm:
      # TR_061-followup — pin off env-default Kimi-K2.6 fallthrough.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    tools:
      builtin: [readFile, listDirectory, searchFiles, getFileTree]
    prompt_extensions: []

  context-fixer:
    role: "Technical writer"
    goal: "Apply additive context-file edits that resolve maintenance findings"
    llm:
      # TR_061-followup — pin off env-default Kimi-K2.6 fallthrough.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.2
    tools:
      # Pared-down set — context-fixer verifies the current file
      # state before editing, but doesn't need to enumerate the tree.
      builtin: [readFile, listDirectory]
    prompt_extensions: []

  # ── Planning layer (migration 024) ──────────────────────────────
  # architecture-agent is consulted twice per feature:
  #   1. High-level design (feature-level) — before any code is written
  #   2. Focused design (phase-level)      — before each phase is submitted
  # Operator opt-in: HARNESS.json `planner.enabled` controls whether
  # the planning layer engages at all; `planner.architectureReviewPerPhase`
  # controls the per-phase pass.
  architecture-agent:
    rules:
    - High-level architecture must fit within the existing module structure defined in ARCHITECTURE.md
    - Do not introduce circular dependencies between modules
    - Per-phase designs must only reference files that exist or are being created in that phase
    - 'When reviewing a draft architecture: check that every interface or abstraction has a named concrete implementation, all symbol names are consistent, and no implementation choice is left open for a developer to decide.'
    - When your architecture introduces any new domain concept that does not appear in the existing project documentation (new lifecycle states, new enum values, new entity types, new relationships), you MUST include it in architectureMdUpdate so the project documentation stays consistent with the architecture. Never introduce a concept in code interfaces that is absent from the project docs.
    - 'When a phase includes multiple domain mutations that must be coordinated (a primary operation plus a cross-cutting concern such as audit logging, event publishing, or cache invalidation), explicitly state the transaction semantics: whether the operations execute atomically in a single transaction, as separate transactions, or via a compensating pattern. Do not leave transaction behavior implicit.'
    - When a canonical schema is provided for a table, use it exactly. Do not redefine column types, sizes, or constraints. A table must have one definition across all architecture views.
    - When the declared stack includes a relational database, you MUST include a complete SQL schema in your output for every persistent domain entity you define. A domain entity without a corresponding table definition is incomplete. The schema must include column names, types, constraints, and indices relevant to the entity's lifecycle.
    - Cross-module dependencies must target the owning module's public SERVICE interface, never its repository or other private files. When a per-phase design needs data owned by another module, specify a dependency on that module's service — not its repository. A service depending on its OWN module's repository interface is the standard repository pattern and is correct.
    architectureGuidance:
    - 'For high-level design: identify domain entities (names + key attributes), module list (name + path + what it owns), dependency direction, and recommended phase sequence. Nothing more.'
    - 'For per-phase design: produce exact TypeScript / Python / Go interface signatures, specific import statements using actual file paths, SQL schema if needed, and 3-5 measurable success criteria.'
    - Phase designs must reference only files that already exist OR files being created in this phase — never assume future phases exist.
    - Keep per-phase designs focused on the phase scope — do not redesign the whole feature.
    - 'Per-phase design must include for each dependency: exact file path, exact exported names, exact import statement. Scope: only files that exist now + files being created this phase. Nothing else.'
    - Never reference a module by name alone — always by its exact file path relative to the file being created.
    - For every interface or abstraction you define, specify the concrete implementation that backs it using the declared project stack. Do not leave implementation choices ambiguous — specify enough detail that a developer can implement without asking clarifying questions.
    - The project stack declared in HARNESS.json is the authoritative source for all technology choices. You MUST use the declared test framework, web framework, database client, and package manager exactly as named. Do not substitute alternatives based on personal preference or assumed defaults. If the declared stack names a specific framework, every reference in your output must use that framework's name and conventions.
    - 'Before emitting your response, verify: every framework reference in your output matches the declared stack. If you find a mismatch, correct it before returning.'
    - Every state transition described in the feature must have a corresponding method in at least one phase. If an entity changes state during the feature lifecycle, ensure the phase plan includes a method for each transition — not just the initial creation.
    role: "Senior software architect"
    goal: "Produce high-level architecture designs and focused per-phase technical specifications that fit the existing project structure"
    llm:
      # TR_050 — switched off moonshotai/Kimi-K2.6 to
      # deepseek-ai/DeepSeek-V3.2. Kimi inference on DeepInfra
      # was unreliable at 12k max_tokens (~50% timeout rate over
      # 2 cycles even with LLM_TIMEOUT_MS=300000). DeepSeek-V3.2
      # has run reliably for every other agent in this matrix
      # including the heavy Aider call (133k tokens consumed
      # without timeout). Kimi remains pinned to self-healing-
      # agent where the prompt size is much smaller.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions:
      - "Always ground your design in the existing ARCHITECTURE.md — extend it, never contradict it"
      - "High-level designs focus on domain entities, module boundaries, and dependency direction only — not implementation details"
      - "Per-phase designs focus on exact interfaces, import paths, and success criteria for that specific phase only"
      - "Domain entities should have minimal attributes at the high level — add detail in per-phase designs"
      - "Module dependencies must be acyclic — check before recommending"
      # TR_034 — per-phase designs must be scoped to exact file paths +
      # exports + import statements. Aider's hallucinations in TR_033
      # came from module-name references in the architecture
      # description; these rules force file paths only.
      - "For per-phase designs: only describe what EXISTS in the repository right now and what THIS phase is building. Never describe future modules or modules not yet built."
      - "For every dependency this phase needs: provide the exact file path as it exists in the repository, the exact export names, and the exact import statement to use."
      - "Do not use module names as import paths. Use file paths."
      - "Example of correct output: 'The database connection is at src/shared/db/connection.ts and exports: export const pool: Pool. Import it as: import { pool } from \"../../shared/db/connection\"'"
      - "Example of incorrect output: 'Use the shared/db module'"

  # ─── Architecture crew (TR_051 / ADR-056 Phase 1) ────────────────────
  # LangGraph StateGraph: three specialists deliberate in parallel,
  # then chief reconciles. Replaces the feature-level designFeature +
  # reviewDesign pair on the architecture-agent above. The
  # architecture-agent entry remains in use for the per-phase
  # designPhase + reviewPhaseDesign (Phase 2 of the migration replaces
  # those too).
  #
  # TR_050 matrix: specialists on deepseek-ai/DeepSeek-V3.2 (steady,
  # reliable under DeepInfra); chief on moonshotai/Kimi-K2.6 because
  # the reconciliation task fits within Kimi's strength on direct
  # structured output and the chief budget (12k) is the same as the
  # working single-agent setting under TR_050.

  domain-architect-agent:
    rules:
    - Define domain entities with exact field names, types, and lifecycle states
    - Every state transition must be named and documented in lifecycleStates
    - Do not define persistence or infrastructure concerns — focus on domain only. The data architect handles SQL schemas and repositories; the application architect handles modules and services.
    - Every lifecycle state you introduce must appear in domainNotes so the chief architect can fold it into architectureMdUpdate.
    role: "Domain architect"
    goal: "Define the domain model: entities, relationships, lifecycle states, and business rules for this feature"
    llm:
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions:
      - "Focus exclusively on domain concepts — entities, attributes, lifecycle states, business rules"
      - "Do not specify persistence (data architect handles that) or modules / APIs (application architect handles that)"
      - "Every lifecycle state must be named explicitly so the chief can fold it into architectureMdUpdate"

  data-architect-agent:
    rules:
    - Every domain entity that persists state requires a CONCEPTUAL table spec — table name, field names (no SQL types), primary key, foreign-key relationships, index rationale. Do NOT write SQL DDL or CREATE TABLE; the code agent generates migrations from this specification
    - Every repository interface must name its concrete backing implementation using the declared stack — do not leave the choice open
    - Use the declared database client — do not substitute alternatives
    - When the same table appears in multiple repositories, its schema must be defined exactly once and referenced by name elsewhere
    role: "Data architect"
    goal: "Define the persistence layer: conceptual table specifications (no DDL), repository interfaces, and concrete implementations for this feature"
    llm:
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions:
      - "Describe each table CONCEPTUALLY: name, field names (no SQL types), primary key, foreign-key relationships, index rationale"
      - "Do NOT write SQL DDL — no CREATE TABLE statements; the code agent generates migrations from this specification"
      - "Every repository interface must name its concrete backing implementation using the declared stack — PostgreSQL via pg Pool"
      - "Index rationale must reflect the entity's lifecycle and access patterns"

  app-architect-agent:
    rules:
    - Define clear layer boundaries — presentation, application, domain, infrastructure
    - Dependencies flow inward only — outer layers depend on inner layers, never the reverse
    - Every public service method must be defined in an interface before the implementation
    - No circular dependencies between modules — verify your dependencyMap before returning
    role: "Application architect"
    goal: "Define the application layer: module boundaries, service interfaces, dependency direction, and recommended phase decomposition"
    llm:
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions:
      - "Service methods are NAMES WITH PARAMETER NAMES ONLY — e.g. deductBalance(employeeId, leaveType, days, fiscalYear); no TypeScript types or return types (the design agent adds types)"
      - "Dependencies flow inward only — outer layers toward inner layers; never the reverse"
      - "No circular dependencies between modules — verify dependencyMap before returning"
      - "Recommended phases should each fit within Aider's effective context window"

  chief-architect-agent:
    rules:
    - Your role is reconciliation, not regeneration — work with what the specialists produced
    - Resolve symbol name conflicts by choosing one canonical name and applying it everywhere — across entities, repositories, services, and the markdown summary
    - Verify stack compliance across all three specialist designs before producing final output — if any specialist used a framework not in the declared stack, correct it
    - 'The final architecture must include: domain entities, conceptual table specifications (no SQL DDL), repository interfaces with concrete implementations, module boundaries, dependency map, and phase recommendations'
    - If a specialist slice is missing (errors block in the prompt), reconcile around it — supply the minimum content needed to keep the feature buildable, not a fresh design
    - Every lifecycle state introduced by the domain architect must be reflected in architectureMdUpdate
    role: "Chief architect and design reviewer"
    goal: "Reconcile the domain, data, and application designs into a single coherent architecture. Resolve conflicts, enforce stack compliance, ensure completeness."
    llm:
      # TR_053 amendment verification — Kimi-K2.6 was flaking on 12k
      # chief calls (~50% timeout rate observed). Switch chief to
      # DeepSeek-V3.2 to keep verification cycles flowing. Revisit
      # the chief model choice once DeepInfra Kimi stability improves.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions:
      - "You receive three specialist designs. Your job is to reconcile them, not regenerate them."
      - "Resolve naming conflicts by choosing the most semantically correct name and applying it consistently"
      - "If any specialist missed a stack compliance requirement, correct it"
      - "If a specialist slice is missing, supply the smallest reconciliation that keeps the feature buildable"
      - "Keep SQL schemas CONCEPTUAL (table name, field names, keys, index rationale) — do NOT write CREATE TABLE / SQL DDL"

  planner-agent:
    rules:
    - Maximum 5 files per phase
    - Each phase must be independently deployable through CI and the gate
    - Phases must be ordered by dependency — never reference a file from a future phase
    - Domain model files (*.model.ts, interfaces, DTOs, types) must be in the same phase as any repository that uses them.
    - The architecture specification provided above defines the canonical type names, interface names, and symbol names for this feature. Use these exact names in all phase scopes. Do not invent alternative names or rename types.
    phaseScopingRules:
    - 'GOOD scope: ''Create src/modules/leave/leave.model.ts with TypeScript interfaces for LeaveRequest and CreateLeaveRequestDto. Import LeaveType, LeaveStatus from src/shared/types/index.ts which already exists.'' — specific, concrete, references real paths.'
    - 'BAD scope: ''Build the leave module'' — too broad, Aider will lose context.'
    - 'GOOD scope: ''Create src/modules/leave/leave.model.ts AND src/modules/leave/leave.repository.ts together. Define LeaveRequest, CreateLeaveRequestDto in the model file. Implement ILeaveRepository in the repository file referencing those types.'' — model and repository together so Aider sees both the field definitions and their usage in a single context.'
    - 'BAD scope: ''Create the service and routes and tests'' — multiple concerns, should be separate phases.'
    - Always mention existing files the phase depends on by exact path so Aider reads them before generating.
    - Include test file expectations in the scope — 'Include Jest unit tests in tests/unit/modules/leave/'.
    - Always include the domain model (interfaces / DTOs / types) and the repository in the SAME phase. Never put the DTO in phase N and the repository in phase N+1 — Aider cannot see the DTO fields when generating the repository and will hallucinate field names.
    - A phase that creates a repository MUST also include the DTO / interface file that defines the types the repository operates on.
    - 'Each phase scope MUST explicitly list the files created in prior phases that this phase depends on, using their exact paths. Example: ''This phase depends on src/modules/leave/leave.model.ts from Phase 1 — read it before generating any code that references its types.'' Without this, Aider will hallucinate field names instead of reading the actual type definitions.'
    - When writing a repository phase scope, always reference the exact model/interface file path from the prior phase. Never assume Aider knows what types exist.
    - The file list in each phase scope is an estimate. The architecture agent will produce the authoritative file list for each phase. Your scope text must not contradict the architecture output — if the architecture specifies 3 files, the scope must not claim 2.
    - When writing file counts in phase scopes, use 'approximately' or give a range rather than an exact number. The architecture agent determines the exact file list.
    role: "Technical project planner"
    goal: "Decompose a feature into a sequence of small, independently deployable phases that each fit within Aider's effective context window"
    llm:
      # TR_050 — DeepInfra DeepSeek-V3.2 (no reasoning_effort).
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    prompt_extensions:
      - "Each phase must touch at most 5 files — prefer 2-3 files per phase"
      - "Each phase must have a single clear concern (model, repository, service, routes — not combined)"
      - "Phases must be ordered by dependency — a phase can only use files from prior phases or existing files"
      - "The scope field must be Aider-ready: specific, self-contained, referencing existing files by exact path"
      - "Maximum 10 phases per feature — if more are needed, the feature is too large and should be split"

  phase-evaluator-agent:
    rules:
    - 'To detect what files were built in this phase, prefer running: git show --name-only --format= <mergeCommitSha>. This shows exact files from the squash-merge commit. If mergeCommitSha is null, fall back to: git diff origin/<defaultBranch>~1..origin/<defaultBranch>'
    - Before evaluating a phase, run executeScript with the command above to get the actual list of files changed. Use this as your evidence of what was built.
    - 'If the git command returns empty output, the phase wrote no files. Escalate with reason: ''Aider completed but wrote 0 files (confirmed by git)''.'
    - If the git command returns files, evaluate them against the phase scope to determine success.
    - Never rely on artifact metadata or Aider stdout to determine what files were created — git is the only source of truth.
    - Evaluate based on actual built files, not planned files.
    - Adjust remaining phase scopes to use actual file paths, not planned paths.
    - Only escalate when architectural incompatibility cannot be resolved by adjusting remaining phases.
    - When adjusting remaining phase scopes after a partial success, always update the scope to include the exact file paths of files created in the completed phase. Replace generic references like 'leave.model.ts' with full paths like 'src/modules/leave/leave.model.ts'.
    - When adjusting the scope of a routes or controller phase, always cite the service or handler file it depends on so Aider reads it before generating. The scope must make clear which methods are available to call.
    evaluationCriteria:
    - 'Success: git diff shows files matching the phase scope AND those files meet the success criteria.'
    - 'Escalate — zero files: git diff is empty despite Aider reporting success.'
    - 'Escalate — wrong files: git diff shows files unrelated to the phase scope.'
    - 'Partial: some expected files present, adjust remaining phases and continue.'
    - 'When adjusting remaining phases: update exact file paths to match what was actually created, update interface names if they changed, update import paths if module structure differed from plan.'
    role: "Technical delivery reviewer"
    goal: "Evaluate what was actually built in a completed phase, assess whether it matches the plan, and recommend adjustments to subsequent phases based on real results"
    llm:
      # TR_050 — DeepInfra DeepSeek-V3.2 (no reasoning_effort).
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.1
    tools:
      # TR_026 — executeScript is mandatory: the agent runs `git diff`
      # against the phase branch itself to discover what was built.
      # The platform no longer pre-computes the file list. Read-only
      # file tools support the agent's evidence-gathering follow-ups.
      builtin: [executeScript, readFile, searchFiles, listDirectory, getFileTree]
    prompt_extensions:
      - "Always run git diff via executeScript before forming a verdict — that is your evidence"
      - "Base your evaluation on the actual files git reports — not on what was planned"
      - "If the implementation differs from the plan but is still correct, that is acceptable — adjust the plan, not the verdict"
      - "Only escalate to human if the phase produced code that is fundamentally incompatible with the remaining phases"
      - "Adjustments to remaining phases should update file paths, interface names, and import statements to match what was actually built"

  # ── Self-healing diagnostician (TR_024 — migration 020/026) ──
  # Decides what to do when a cycle fails — retry, submit a fix
  # intent for a systemic gap, or escalate. Per ADR-050 the
  # routing decision lives with the LLM, not the platform code.
  # Operators tune the model (chat-latest recommended for the
  # best reasoning) + persona; rules live in HARNESS.json's
  # `agentConfig.self-healing-agent` block.
  self-healing-agent:
    rules:
    - 'Your primary job is to decide the correct ACTION: retry, fix-intent, or escalate'
    - 'Choose retry when: the failure is in the generated code logic, a deployment step, or a transient error that a fresh attempt would resolve'
    - 'Choose fix-intent when: the failure reveals a gap in the project itself that will cause the same error on every retry — the project needs to be fixed first'
    - 'Choose escalate when: the failure requires human judgment, is caused by external infrastructure, or you cannot determine the root cause with confidence'
    - 'When choosing fix-intent: write a fixIntent that is specific, Aider-ready, and scoped only to fixing the gap — not rebuilding the feature'
    - resumeAfterFix should be true when the original intent will succeed once the gap is fixed
    - 'For failures of type ''review-requested-changes'': the PR-Agent review comment is in technicalDetail. Read it carefully before deciding action. Minor code issues → fix-intent. Architectural concerns → fix-intent with broader scope. Apparent false positives → retry.'
    role: "Autonomous failure analyst and recovery coordinator"
    goal: "Analyse failures and decide the correct recovery action: retry with fixes, submit a fix intent for systemic gaps, or escalate to human"
    llm:
      # TR_050 — DeepInfra-hosted moonshotai/Kimi-K2.6 for the
      # routing-quality bar (retry vs fix-intent vs escalate).
      # reasoning_effort intentionally omitted.
      model: fireworks/FireworkAI-Deepseek-v4-pro
      temperature: 0.0
    prompt_extensions:
      - "Always ground your diagnosis in the actual error output — do not infer failures not evidenced in the provided context"
      - "A fix-intent is only appropriate when retrying the same intent would produce the same failure"


# ─── Custom agents (ADR-037) ─────────────────────────────────────────────────
# Project-specific LLM agents that run after the framework generate agents
# (intent / design / context / lint-config / code / test) and BEFORE
# dispatch to the quality gate. They receive the generated artifacts and
# return structured findings. The orchestrator routes findings to typed
# signals:
#   high severity   → CONSTRAINT_VIOLATION
#   medium / low    → LINT_FAILURE
#   error (LLM/parse) → CONTEXT_GAP
# All of which the gate orchestrator evaluates alongside framework signals.
# Custom agents NEVER emit GOLDEN_PRINCIPLE_BREACH.
#
# Prompt template placeholders:
#   {{role}}, {{goal}}           — fields on the agent definition
#   {{artifacts}}                — generated code files (code type only),
#                                  truncated to 2000 chars each, formatted
#                                  as ### path / ```typescript ... ```
#   {{goldenPrinciples}}         — bullet list of GP-NNN titles + descriptions
#   {{intentText}}               — the operator's original intent string
#   trackeros              — HARNESS.json `name` field
#   {{evidenceRequirement}}      — TR_013. Drops in the shared "every
#                                  finding must include quotedLine"
#                                  prompt section. Strongly recommended
#                                  for ANY custom agent that emits
#                                  findings — the platform parser drops
#                                  unevidenced findings, so omitting this
#                                  from the prompt leaves the LLM
#                                  blind to the requirement and EVERY
#                                  finding it emits will be discarded.
#   {{quotedLineSchema}}         — TR_013. Drops in the `"quotedLine":
#                                  "..."` JSON schema field. Include
#                                  inside the `findings[]` object in the
#                                  Expected JSON response schema below.
#
# Custom agent findings must include "quotedLine" — the exact line from
# the artifact that constitutes the violation, quoted verbatim. Findings
# without quotedLine are automatically dropped by the platform before
# reaching the gate. This prevents hallucinated findings from blocking
# cycles. Include {{evidenceRequirement}} in your prompt body and
# {{quotedLineSchema}} inside the findings[] object to surface this
# contract to the LLM.
#
# Expected JSON response from the LLM:
#   {
#     "passed": true | false,
#     "findings": [
#       {
#         "severity": "high|medium|low",
#         "file": "path",
#         "quotedLine": "the exact violating line copied verbatim",
#         "description": "..."
#       }
#     ],
#     "summary": "one-line overall verdict"
#   }
#
# Example — uncomment and edit to enable:
#
# runs_after — ordering hint (ADR-037 / runs_after enforcement,
#   2026-06-02). Names the framework agent OR another custom agent
#   that must complete before this custom agent runs. Omit (or set to
#   null) to default to `test-agent` — the last framework generate
#   agent — which matches the pre-enforcement "run at the end"
#   behaviour. Valid framework targets: intent-agent, design-agent,
#   context-agent, lint-config-agent, code-agent, test-agent.
#   Unknown targets and cycles in the custom-agent graph are caught
#   by `gestalt agents validate` and fail intent submission with a
#   CONTEXT_GAP signal.
#
# custom_agents:
#   - name: security-review-agent
#     role: "Application security reviewer"
#     goal: "Identify OWASP Top 10 vulnerabilities in generated code"
#     runs_after: code-agent      # run right after code-agent finishes
#                                 # — before test-agent generates tests
#     llm:
#       model: ~           # null = platform default; override with e.g. "gpt-4o"
#       temperature: 0.1
#       max_tokens: 4000
#     prompt: |
#       You are {{role}}. Goal: {{goal}}.
#
#       {{evidenceRequirement}}
#
#       Review the following generated code for OWASP Top 10 issues
#       (SQL injection, XSS, IDOR, missing auth checks, sensitive data
#       exposure):
#
#       {{artifacts}}
#
#       Project golden principles to respect:
#       {{goldenPrinciples}}
#
#       Return JSON only — no markdown fences, no preamble:
#       {
#         "passed": true|false,
#         "findings": [
#           {
#             "severity": "high|medium|low",
#             "file": "path",
#             {{quotedLineSchema}},
#             "description": "..."
#           }
#         ],
#         "summary": "one line"
#       }
#
#   - name: performance-agent
#     role: "Performance reviewer"
#     goal: "Spot N+1 queries, sync I/O on hot paths"
#     runs_after: security-review-agent   # depend on another custom
#     llm: { temperature: 0.1 }
#     prompt: |
#       ...
#
#   - name: docs-check-agent
#     role: "Documentation reviewer"
#     goal: "Ensure exported functions have JSDoc"
#     runs_after: test-agent              # run after tests are generated
#     llm: { temperature: 0.1 }
#     prompt: |
#       Check JSDoc on these files: {{artifacts}}
#       Return JSON: { "passed": true, "findings": [], "summary": "ok" }
