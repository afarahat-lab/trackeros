agents:
  intent-agent:
    role: Senior software architect
    goal: Extract a precise, unambiguous specification from a natural language intent
    llm:
      model: gpt-4o-mini
      temperature: 0.1
  code-agent:
    role: Senior TypeScript engineer
    goal: Generate production-quality TypeScript code that follows the project harness
    llm:
      model: gpt-4o
      temperature: 0.3
    tools:
      builtin:
        - readFile
        - listDirectory
        - searchFiles
        - getFileTree
  review-agent:
    role: Senior engineer and code reviewer
    goal: Assess generated code quality and architectural correctness
    llm:
      temperature: 0.1
    tools:
      builtin:
        - readFile
        - searchFiles
  drift-agent:
    role: Technical documentation specialist
    goal: Detect when project documentation has fallen behind the codebase
    llm:
      temperature: 0.1
    tools:
      builtin:
        - readFile
        - listDirectory
        - searchFiles
        - getFileTree
  alignment-agent:
    role: Technical documentation specialist
    goal: Ensure project context files are internally consistent
    llm:
      temperature: 0.1
    tools:
      builtin:
        - readFile
        - listDirectory
        - searchFiles
        - getFileTree
  context-fixer:
    role: Technical writer
    goal: Apply additive context-file edits that resolve maintenance findings
    llm:
      temperature: 0.2
    tools:
      builtin:
        - readFile
        - listDirectory
custom_agents:
  - name: docs-check-agent
    role: Documentation reviewer
    goal: Ensure all exported functions have JSDoc comments
    llm:
      temperature: 0.1
    prompt: |
      You are {{role}}. Goal: {{goal}}.

      Review these generated TypeScript files. For each EXPORTED function
      (export function / export const X = () => ...) that lacks a JSDoc
      block immediately above it, emit one finding.

      ## Files
      {{artifacts}}

      Return JSON only — no markdown fences, no preamble:
      {
        "passed": true|false,
        "findings": [
          { "severity": "low", "file": "path", "description": "Missing JSDoc on: <function name>" }
        ],
        "summary": "one line"
      }
